name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black isort pyright

      - name: Run ruff (lint) and auto-fix
        run: |
          ruff check . || true
          ruff --fix .
          # If ruff --fix changed files, fail the job so PRs must be formatted
          git --no-pager diff --exit-code || (echo "Code not formatted by ruff --fix" && exit 1)

      - name: Run isort and black check
        run: |
          isort --check-only .
          black --check .

      - name: Set up Node cache (for pyright)
        uses: actions/cache@v4
        with:
          path: ~/.nodeenv
          key: ${{ runner.os }}-nodeenv-${{ hashFiles('.nodeenv') }}
          restore-keys: |
            ${{ runner.os }}-nodeenv-

      - name: Run type checks (pyright --strict)
        run: |
          pyright --strict

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Build Docker image (no push)
        run: |
          docker build -t inventario-backend:ci .

  test-with-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Redis rate limiter tests
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          python -m pytest tests/test_redis_rate_limiter.py -v
