services:
  - type: web
    name: inventario-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: inventario-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: CREATE_SCHEMA_ON_STARTUP
        value: "false"
      - key: SSL_ENABLED
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "false"
      - key: CORS_ORIGINS
        value: https://inventario-frontend.onrender.com,http://localhost:5173
      - key: TRUSTED_HOSTS
        value: inventario-backend-o0gu.onrender.com,localhost
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: RATE_LIMIT_REQUESTS
        value: "200"
      - key: RATE_LIMIT_WINDOW
        value: "60"
      - key: LOG_LEVEL
        value: INFO
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: REDIS_HEALTH_CHECK_ENABLED
        value: "false"
      - key: PROMETHEUS_ENABLED
        value: "false"
      - key: METRICS_ENABLED
        value: "true"

databases:
  - name: inventario-db
    databaseName: inventario
    user: inventario_user
    plan: free
    region: oregon
